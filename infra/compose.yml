# v1.0.0 — Dev PostgreSQL only (ADR-020)
#
# Native dev path: DB in Docker, backend/frontend run via npm run start:dev.
# Do NOT use this volume for prod (kc_prod) — use docker-compose.prod.yml instead.
#
# Usage:
#   docker compose -f infra/compose.yml up -d      Start PG (kc_dev on :5432)
#   docker compose -f infra/compose.yml down        Stop PG (keep data)
#   docker compose -f infra/compose.yml down -v     Stop PG + delete data
#
# VULN: Default superuser with trivial password, port exposed to host.
#       CWE-1393 (Use of Default Credentials) | A07:2025
#       CWE-798  (Use of Hard-coded Credentials) | A07:2025
#       Remediation (v2.0.0): Strong password from Docker secrets,
#       no host port binding, dedicated non-superuser for the app.

services:
  db:
    image: postgres:16
    container_name: kc-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kc_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
