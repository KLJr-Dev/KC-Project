# v0.7.x — Production Docker stack (CWE-798: hardcoded defaults intentional)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kc_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: kc_prod
      PORT: 4000
    volumes:
      - uploads:/app/uploads
    expose:
      - '4000'

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    depends_on:
      - backend
    expose:
      - '3000'

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  uploads:
