server {
    listen 80;

    # nginx default client_max_body_size is 1m — blocks large uploads before they
    # reach Multer. Accidental infra ceiling, NOT intentional CWE-400.
    # See docs/security/Cycle-1/Dev/v1.0.0-ground-truth.md § Infrastructure.
    # Uncomment to raise or remove:
    # client_max_body_size 10m;

    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
